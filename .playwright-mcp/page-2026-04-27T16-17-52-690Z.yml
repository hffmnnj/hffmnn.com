          - heading "Installation" [level=2] [ref=e96]
          - code [ref=e98]: "# From crates.io (recommended) cargo install mamf # Or from source git clone https://github.com/hffmnnj/me-and-my-friends cd me-and-my-friends cargo install --path ."
          - heading "Prerequisites" [level=3] [ref=e99]
          - code [ref=e101]: "# Ollama (recommended for local inference) # Install from https://ollama.ai ollama pull phi4:14b # Or any model ollama pull nomic-embed-text # For RAG embeddings # Qdrant (for knowledge base) docker run -d -p 6333:6333 -p 6334:6334 qdrant/qdrant # Optional: Claude CLI for deep research npm install -g @anthropic-ai/claude-code"
          - heading "Quick Start" [level=2] [ref=e102]
          - code [ref=e104]: "# Initialize config file mamf init # Launch the TUI mamf tui # Or use CLI directly mamf discuss \"What should our pricing strategy be?\" mamf ask cfo \"What's our runway?\""
          - heading "How It Works" [level=2] [ref=e105]
          - paragraph [ref=e106]: "The magic of MAMF is in its orchestration. When you ask a question:"
          - list [ref=e107]:
            - listitem [ref=e108]:
              - strong [ref=e109]: Your question goes to each advisor
              - text: — They respond in parallel or sequence, each through their unique lens
            - listitem [ref=e110]:
              - strong [ref=e111]: Advisors see each other's responses
              - text: — In Living Council mode, they can debate and refine their positions
            - listitem [ref=e112]:
              - strong [ref=e113]: The chairman synthesizes
              - text: — A dedicated synthesis advisor weighs all perspectives and provides a final recommendation
            - listitem [ref=e114]:
              - strong [ref=e115]: RAG provides context
              - text: — If you've indexed documents, relevant information is injected so advisors understand your specific situation
          - heading "1. Define Your Advisors" [level=3] [ref=e116]
          - paragraph [ref=e117]: "Each advisor is a persona backed by an LLM. You control their personality (via system prompt), their \"expertise\" (how they interpret questions), and which AI model powers them:"
          - code [ref=e119]: "advisors: cfo: name: \"Chief Financial Officer\" emoji: \"💰\" model: \"llama-3.3-70b-versatile\" provider: groq temperature: 0.3 system_prompt: \"You are a seasoned CFO focused on financial sustainability...\""
          - heading "2. Ask Your Question" [level=3] [ref=e120]
          - code [ref=e122]: mamf discuss "Should we raise a seed round or bootstrap?"
          - heading "3. Get Diverse Perspectives" [level=3] [ref=e123]
          - paragraph [ref=e124]: "Each advisor responds from their expertise:"
          - list [ref=e125]:
