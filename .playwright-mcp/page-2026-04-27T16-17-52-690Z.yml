          - paragraph [ref=e48]:
            - strong [ref=e49]: Your personal board of AI advisors, ready to debate any decision.
          - paragraph [ref=e50]: "Ever wished you could run an idea past a room full of experts—a CFO to crunch numbers, a CTO to flag technical risks, a devil's advocate to poke holes in your plan? MAMF gives you exactly that: a council of AI personas, each with distinct expertise and personality, who discuss your questions and synthesize their perspectives into actionable advice."
          - paragraph [ref=e51]: Think of it as ChatGPT meets a boardroom simulation. Instead of getting one AI's opinion, you get a structured debate from multiple angles, followed by a chairman who weighs all viewpoints and delivers a balanced recommendation.
          - paragraph [ref=e52]:
            - img "Dashboard" [ref=e53]
          - heading "Why Multiple AI Advisors?" [level=2] [ref=e54]
          - paragraph [ref=e55]: "A single AI gives you one perspective. But real decisions benefit from diverse viewpoints:"
          - list [ref=e56]:
            - listitem [ref=e57]:
              - strong [ref=e58]: Blind spots get caught
              - text: — Your CTO might love a feature, but your CFO asks "what's the ROI?"
            - listitem [ref=e59]:
              - strong [ref=e60]: Bias gets balanced
              - text: — An optimistic marketer is tempered by a skeptical legal advisor
            - listitem [ref=e61]:
              - strong [ref=e62]: Ideas get stress-tested
              - text: — The wildcard advisor challenges assumptions everyone else accepts
            - listitem [ref=e63]:
              - strong [ref=e64]: Context matters
              - text: — Each advisor interprets your question through their domain expertise
          - paragraph [ref=e65]: MAMF orchestrates this multi-perspective approach automatically, so you get richer, more nuanced answers than any single AI can provide.
          - heading "Features" [level=2] [ref=e66]
          - list [ref=e67]:
            - listitem [ref=e68]:
              - strong [ref=e69]: Multi-Advisor Council
              - text: — Multiple AI personas discuss your question from different angles, then a chairman synthesizes the best answer
            - listitem [ref=e70]:
              - strong [ref=e71]: Provider Flexibility
              - text: "— Mix and match models: Ollama for local privacy, Gemini for speed, Groq for cost, Claude for research"
            - listitem [ref=e72]:
              - strong [ref=e73]: Knowledge Base (RAG)
              - text: — Index your documents so advisors have context about your specific domain, company, or project
            - listitem [ref=e74]:
              - strong [ref=e75]: Living Council
              - text: — Advisors debate and iterate until they reach consensus (not just sequential responses)
            - listitem [ref=e76]:
              - strong [ref=e77]: Beautiful TUI
              - text: — Full terminal interface with streaming responses, session history, and settings
          - 'heading "Quick Demo: Cat Advisory Council" [level=2] [ref=e78]'
