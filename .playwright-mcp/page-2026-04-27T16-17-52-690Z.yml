          - heading "Discussion Modes" [level=2] [ref=e353]
          - paragraph [ref=e354]: "MAMF offers several ways to consult your advisors, depending on what kind of answer you need:"
          - heading "Council Mode (Default)" [level=3] [ref=e355]
          - paragraph [ref=e356]:
            - strong [ref=e357]: "Best for: Quick decisions where you want multiple perspectives"
          - paragraph [ref=e358]: All advisors respond sequentially, then the chairman synthesizes at the end. Fast and comprehensive.
          - code [ref=e360]: mamf discuss "Should we raise funding?"
          - heading "Focus Mode" [level=3] [ref=e361]
          - paragraph [ref=e362]:
            - strong [ref=e363]: "Best for: Domain-specific questions where only some advisors are relevant"
          - paragraph [ref=e364]: Filter to advisors tagged with relevant expertise. Why ask your CMO about database architecture?
          - code [ref=e366]: "mamf discuss --focus=funding \"Seed round strategy\" # CFO, Investor, Legal mamf discuss --focus=technical \"Architecture decisions\" # CTO, Security, Infrastructure"
          - heading "Living Council" [level=3] [ref=e367]
          - paragraph [ref=e368]:
            - strong [ref=e369]: "Best for: Complex, nuanced decisions that benefit from debate"
          - paragraph [ref=e370]: Advisors don't just respond—they read each other's answers and can push back, refine, or build on ideas. The discussion continues until they reach a configurable level of agreement.
          - code [ref=e372]: "mamf living \"Market expansion strategy\" mamf living --convergence=0.8 \"Pricing model\" # Higher = more agreement needed"
          - heading "Deep Mode" [level=3] [ref=e373]
          - paragraph [ref=e374]:
            - strong [ref=e375]: "Best for: Strategic questions that need thorough exploration"
          - paragraph [ref=e376]: Multiple rounds of discussion, where each round builds on the previous. Good for roadmapping, planning, and complex tradeoffs.
          - code [ref=e378]: mamf discuss --rounds=3 "Product roadmap"
          - heading "One-on-One" [level=3] [ref=e379]
          - paragraph [ref=e380]:
            - strong [ref=e381]: "Best for: Quick questions to a specific expert, or following up on a council response"
          - paragraph [ref=e382]: Chat directly with a single advisor when you know exactly who you need.
          - code [ref=e384]: mamf ask cfo "Revenue projections" mamf ask wildcard "Disrupt our own business model"
          - heading "Research Mode" [level=3] [ref=e385]
          - paragraph [ref=e386]:
            - strong [ref=e387]: "Best for: Deep dives requiring external information"
          - paragraph [ref=e388]: Uses Claude CLI with MCP tools to perform actual research—searching the web, reading documents, and synthesizing findings.
          - code [ref=e390]: mamf research "Competitive analysis of smart ring market"
          - heading "Knowledge Base (RAG)" [level=2] [ref=e391]
          - paragraph [ref=e392]:
            - text: Out of the box, your advisors are generalists—they know about business, technology, and strategy, but nothing about
            - emphasis [ref=e393]: your
            - text: specific situation. The knowledge base fixes that.
          - paragraph [ref=e394]:
            - text: Index your company documents, product specs, meeting notes, or research, and MAMF will automatically pull relevant context when advisors respond. Your CFO can now reference your
            - emphasis [ref=e395]: actual
            - text: runway numbers. Your CTO knows about your
            - emphasis [ref=e396]: real
            - text: technical debt.
          - code [ref=e398]: "# Index a directory of markdown files mamf knowledge index ./docs # Query the knowledge base directly mamf knowledge query \"pricing strategy\" # View what's been indexed mamf knowledge stats"
          - paragraph [ref=e399]:
            - text: RAG context is automatically injected into advisor prompts when
            - code [ref=e400]: "auto_inject: true"
            - text: (default). You'll see which documents were used in the TUI's source references panel.
          - heading "Knowledge Base Structure" [level=3] [ref=e401]
          - paragraph [ref=e402]: "Organize your docs with YAML frontmatter for better retrieval:"
          - code [ref=e404]: "--- title: Pricing Strategy category: business tags: [pricing, revenue, monetization] --- # Our Pricing Strategy Content here..."
          - paragraph [ref=e405]: The more structured your documents, the better MAMF can find the right context for each question.
          - heading "Configuration" [level=2] [ref=e406]
          - paragraph [ref=e407]:
            - text: "Config file location:"
            - code [ref=e408]: ~/.config/mamf/config.yaml
            - text: or
            - code [ref=e409]: ./mamf.yaml
            - text: (local takes priority)
