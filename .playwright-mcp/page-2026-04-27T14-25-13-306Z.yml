          - paragraph [ref=e46]:
            - strong [ref=e47]: Your personal board of AI advisors, ready to debate any decision.
          - paragraph [ref=e48]: "Ever wished you could run an idea past a room full of experts—a CFO to crunch numbers, a CTO to flag technical risks, a devil's advocate to poke holes in your plan? MAMF gives you exactly that: a council of AI personas, each with distinct expertise and personality, who discuss your questions and synthesize their perspectives into actionable advice."
          - paragraph [ref=e49]: Think of it as ChatGPT meets a boardroom simulation. Instead of getting one AI's opinion, you get a structured debate from multiple angles, followed by a chairman who weighs all viewpoints and delivers a balanced recommendation.
          - paragraph [ref=e50]:
            - img "Dashboard" [ref=e51]
          - heading "Why Multiple AI Advisors?" [level=2] [ref=e52]
          - paragraph [ref=e53]: "A single AI gives you one perspective. But real decisions benefit from diverse viewpoints:"
          - list [ref=e54]:
            - listitem [ref=e55]:
              - strong [ref=e56]: Blind spots get caught
              - text: — Your CTO might love a feature, but your CFO asks "what's the ROI?"
            - listitem [ref=e57]:
              - strong [ref=e58]: Bias gets balanced
              - text: — An optimistic marketer is tempered by a skeptical legal advisor
            - listitem [ref=e59]:
              - strong [ref=e60]: Ideas get stress-tested
              - text: — The wildcard advisor challenges assumptions everyone else accepts
            - listitem [ref=e61]:
              - strong [ref=e62]: Context matters
              - text: — Each advisor interprets your question through their domain expertise
          - paragraph [ref=e63]: MAMF orchestrates this multi-perspective approach automatically, so you get richer, more nuanced answers than any single AI can provide.
          - heading "Features" [level=2] [ref=e64]
          - list [ref=e65]:
            - listitem [ref=e66]:
              - strong [ref=e67]: Multi-Advisor Council
              - text: — Multiple AI personas discuss your question from different angles, then a chairman synthesizes the best answer
            - listitem [ref=e68]:
              - strong [ref=e69]: Provider Flexibility
              - text: "— Mix and match models: Ollama for local privacy, Gemini for speed, Groq for cost, Claude for research"
            - listitem [ref=e70]:
              - strong [ref=e71]: Knowledge Base (RAG)
              - text: — Index your documents so advisors have context about your specific domain, company, or project
            - listitem [ref=e72]:
              - strong [ref=e73]: Living Council
              - text: — Advisors debate and iterate until they reach consensus (not just sequential responses)
            - listitem [ref=e74]:
              - strong [ref=e75]: Beautiful TUI
              - text: — Full terminal interface with streaming responses, session history, and settings
          - 'heading "Quick Demo: Cat Advisory Council" [level=2] [ref=e76]'
          - paragraph [ref=e77]: "Try MAMF with a fun demo featuring a council of cat experts:"
