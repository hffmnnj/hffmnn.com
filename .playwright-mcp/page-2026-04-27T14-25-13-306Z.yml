              - text: → Technical debt impact, team scaling needs
            - listitem [ref=e128]:
              - strong [ref=e129]: Investor
              - text: → Market timing, valuation expectations
            - listitem [ref=e130]:
              - strong [ref=e131]: Wildcard
              - text: → Unconventional alternatives
